<body data-screen-label="Jannik Richter — Personal Site" class="is-dark">
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

  <script type="text/babel" src="js/Nav.jsx"></script>
  <script type="text/babel" src="js/Hero.jsx"></script>
  <script type="text/babel" src="js/Services.jsx"></script>
  <script type="text/babel" src="js/FolderCTA.jsx"></script>
  <script type="text/babel" src="js/WorkGrid.jsx"></script>
  <script type="text/babel" src="js/About.jsx"></script>
  <script type="text/babel" src="js/Checklist.jsx"></script>
  <script type="text/babel" src="js/Now.jsx"></script>
  <script type="text/babel" src="js/Channel.jsx"></script>
  <script type="text/babel" src="js/Writing.jsx"></script>
  <script type="text/babel" src="js/Experience.jsx"></script>
  <script type="text/babel" src="js/Testimonials.jsx"></script>
  <script type="text/babel" src="js/Contact.jsx"></script>
  <script type="text/babel" src="js/Footer.jsx"></script>

  <script type="text/babel">
    function App() {
      React.useEffect(() => {
        if (typeof IntersectionObserver === 'undefined' || matchMedia('(prefers-reduced-motion: reduce)').matches) return;
        const selector = '.jr-tile, .jr-service, .jr-role, .jr-quote, .jr-post, .jr-now__item, .jr-check, .jr-services__head, .jr-work__head, .jr-about__left, .jr-about__right, .jr-checks > .jr-eyebrow, .jr-checks > h2, .jr-now__head, .jr-channel__inner, .jr-writing__head, .jr-exp__head, .jr-testi__head, .jr-contact > *, .jr-folder-cta > *, .jr-footer__meta, .jr-footer__billboard';
        const targets = Array.from(document.querySelectorAll(selector));
        targets.forEach((el) => {
          el.classList.add('jr-reveal');
          const siblings = el.parentElement ? Array.from(el.parentElement.children).filter(c => c.classList.contains('jr-reveal') || c.matches(selector)) : [];
          const idx = Math.max(0, siblings.indexOf(el));
          el.style.transitionDelay = (Math.min(idx, 6) * 80) + 'ms';
        });
        const io = new IntersectionObserver((entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add('is-visible');
              io.unobserve(entry.target);
            }
          });
        }, { threshold: 0.12, rootMargin: '0px 0px -60px 0px' });
        targets.forEach(t => io.observe(t));
        return () => io.disconnect();
      }, []);

      return (
        <React.Fragment>
          <Nav/>
          <Hero/>
          <Services/>
          <FolderCTA/>
          <WorkGrid/>
          <About/>
          <Checklist/>
          <Now/>
          <Channel/>
          <Writing/>
          <Experience/>
          <Testimonials/>
          <Contact/>
          <Footer/>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
